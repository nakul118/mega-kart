<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Cart | Modern E-Commerce</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Loading Spinner -->
    <div id="loading-spinner" class="spinner-container">
        <div class="spinner"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="#" class="logo" id="home-link">Mega Kart</a>
            
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Search products...">
                <button id="search-btn"><i class="fas fa-search"></i></button>
            </div>

            <div class="nav-actions">
                <button id="dark-mode-toggle" class="icon-btn" title="Toggle Dark Mode">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="cart-icon-container" id="cart-link">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count" class="badge">0</span>
                </div>
                <button id="mobile-menu-toggle" class="mobile-toggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="main-content" class="container">
        <!-- Content will be dynamically rendered here -->
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container footer-grid">
            <div class="footer-info">
                <h3>Mega Kart</h3>
                <p>Your one-stop shop for modern lifestyle essentials.</p>
            </div>
            <div class="footer-links">
                <h4>Information</h4>
                <ul>
                    <li><a href="#" id="footer-about-site">About Website</a></li>
                    <li><a href="#" id="footer-about-products">About Products</a></li>
                    <li><a href="#" id="footer-about-us">About Us</a></li>
                </ul>
            </div>
            <div class="footer-support">
                <h4>Developer</h4>
                <ul>
                    <li><a href="#">Nakul Sharma</a></li>
                    <li><a href="#">Akshay</a></li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 toNexSre. All rights reserved.</p>
        </div>
    </footer>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="scripts.js"></script>
</body>
</html>
